name: Deploy-Azure-Bicep-1-job

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  RESOURCE_GROUP: rg-bicep-github-actions-29
  WEBAPP_NAME: bicep-029

jobs:
  preview-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4   # updated

      - name: Login to Azure
        uses: azure/login@v1        # fixed casing + version
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Create Azure Resource Group
        uses: azure/cli@v2          # updated
        with:
          inlineScript: |
            az group create -n $RESOURCE_GROUP -l westeurope
            
      - name: Preview Changes from Bicep
        uses: azure/cli@v2
        with:
          inlineScript: |
            az deployment group what-if \
              --resource-group $RESOURCE_GROUP \
              --template-file 01-bicep-webapp/webapp-linux.bicep \
              --parameters webAppName=$WEBAPP_NAME
    
          

      - name: Deploy Bicep to Azure
        if: github.event_name == 'workflow_dispatch'   # prevent deploy on PR
        uses: azure/arm-deploy@v1
        with:
          subscriptionId: ${{ secrets.SUBSCRIPTION_ID }}
          resourceGroupName: ${{ env.RESOURCE_GROUP }}
          template: 01-bicep-webapp/webapp-linux.bicep
          parameters: webAppName=${{ env.WEBAPP_NAME }}
          failOnStdErr: false
