name: Deploy-Azure-Bicep-1-job

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  RESOURCE_GROUP: rg-bicep-github-actions-29
  WEBAPP_NAME: bicep-029

jobs:
  preview-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure (OIDC)
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.SUBSCRIPTION_ID }}

      - name: Create Azure Resource Group
        uses: azure/cli@v2          # updated
        with:
          inlineScript: |
            az version
            az group create -n $RESOURCE_GROUP -l westeurope

      - name: Preview Changes fron Bicep
        uses: azure/deployment-what-if-action@v1   # updated (from @v1.0.0)
        with:
          subscription: ${{ secrets.SUBSCRIPTION_ID }}
          resourceGroup: $RESOURCE_GROUP
          templateFile: 01-bicep-webapp/webapp-linux.bicep
          additionalParameters: webAppName=$WEBAPP_NAME

      - name: Deploy Bicep to Azure
        uses: azure/cli@v2
        with:
          inlineScript: |
            az deployment group what-if \
              --resource-group $RESOURCE_GROUP \
              --template-file 01-bicep-webapp/webapp-linux.bicep \
              --parameters webAppName=$WEBAPP_NAME
